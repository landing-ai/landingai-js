name: TSC
on:
  pull_request:
    paths:
      - '.github/workflows/tsc.yml'
      - 'packages/**'
      - 'tsconfig.json'
      - 'package.json'
      - 'yarn.lock'

jobs:
  ci-tsc:
    runs-on: ubuntu-latest

    steps:
    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: "Use NodeJS 18"
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: "Install dependencies"
      run: |
        yarn install

    - name: "TSC"
      run: |
        yarn tsc
